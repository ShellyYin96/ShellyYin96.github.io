  <g>
    <rect x="370" y="80" width="120" height="150" rx="10" fill="#ffffff" stroke="#c9c0ee" stroke-width="2"/>
    <rect x="384" y="98" width="60" height="12" rx="6" fill="#7b6fd0"/>
    <rect x="384" y="120" width="92" height="8" rx="4" fill="#e3def5"/>
    <rect x="384" y="134" width="92" height="8" rx="4" fill="#e3def5"/>
    <rect x="384" y="148" width="70" height="8" rx="4" fill="#e3def5"/>
    <rect x="400" y="110" width="120" height="150" rx="10" fill="#ffffff" stroke="#aac4f5" stroke-width="2"/>
    <rect x="414" y="128" width="60" height="12" rx="6" fill="#5b7de0"/>
    <rect x="414" y="150" width="92" height="8" rx="4" fill="#dbe6fa"/>
    <rect x="414" y="164" width="92" height="8" rx="4" fill="#dbe6fa"/>
