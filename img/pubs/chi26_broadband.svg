<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="430" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4a4a4a"/></marker>
  </defs>

  <!-- title block -->
  <text x="300" y="30" font-size="14" font-weight="800" fill="#333333" text-anchor="middle" letter-spacing="1.5">DOES ACCESS ALONE CLOSE THE GAP?</text>
  <text x="300" y="48" font-size="10.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">spatial regression: county broadband coverage and Wikipedia contributor dynamics</text>
  <line x1="210" y1="60" x2="390" y2="60" stroke="#e4e4e4" stroke-width="1.4"/>

  <!-- row: broadband arrives -> wikipedia editing -->
  <g>
    <rect x="78" y="80" width="150" height="110" rx="8" fill="#ffffff" stroke="#b3b3b3" stroke-width="1.6"/>
    <path d="M 78 132 L 228 126 M 138 80 L 142 190" stroke="#e8e8e8" stroke-width="1.4"/>
    <g stroke="#7d858e" stroke-width="2.4" fill="none" stroke-linecap="round">
      <path d="M 118 148 L 118 134"/>
      <path d="M 111 137 Q 118 129 125 137"/>
      <path d="M 105 131 Q 118 118 131 131"/>
    </g>
    <circle cx="118" cy="151" r="3" fill="#7d858e"/>
    <text x="153" y="207" font-size="10.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="0.6">BROADBAND ARRIVES</text>
  </g>
  <line x1="240" y1="135" x2="278" y2="135" stroke="#4a4a4a" stroke-width="1.8" marker-end="url(#ah)"/>
  <g>
    <rect x="290" y="86" width="118" height="88" rx="7" fill="#ffffff" stroke="#d2d2d2" stroke-width="1.4"/>
    <rect x="302" y="98" width="118" height="92" rx="7" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.6"/>
    <rect x="314" y="112" width="56" height="9" rx="4.5" fill="#8f8f8f"/>
    <rect x="314" y="130" width="92" height="6" rx="3" fill="#e2e2e2"/>
    <rect x="314" y="142" width="92" height="6" rx="3" fill="#e2e2e2"/>
    <rect x="314" y="154" width="70" height="6" rx="3" fill="#e2e2e2"/>
    <g transform="rotate(45 414 178)"><rect x="410" y="164" width="8" height="24" rx="3" fill="#7d858e"/><path d="M 410 188 L 414 196 L 418 188 Z" fill="#7d858e"/></g>
    <text x="356" y="207" font-size="10.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="0.6">WIKIPEDIA EDITING</text>
  </g>
  <line x1="432" y1="135" x2="470" y2="135" stroke="#4a4a4a" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="513" y="128" font-size="11" font-weight="700" fill="#4a4a4a" text-anchor="middle">NECESSARY,</text>
  <text x="513" y="143" font-size="11" font-weight="700" fill="#4a4a4a" text-anchor="middle">BUT NOT</text>
  <text x="513" y="158" font-size="11" font-weight="700" fill="#4a4a4a" text-anchor="middle">SUFFICIENT</text>

  <!-- connectors -->
  <path d="M 300 218 L 300 230 M 162 230 L 438 230 M 162 230 L 162 240 M 438 230 L 438 240" stroke="#c9c9c9" stroke-width="1.4" fill="none"/>

  <!-- two context cards -->
  <g>
    <rect x="66" y="262" width="192" height="148" rx="10" fill="#dde7f5"/>
    <rect x="80" y="246" width="164" height="32" rx="4" fill="#202020"/>
    <text x="162" y="267" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">MORE DIVERSE VOICES</text>
    <g fill="#5b7aa8"><rect x="88" y="368" width="11" height="22" rx="3"/><rect x="104" y="362" width="11" height="28" rx="3"/><rect x="120" y="366" width="11" height="24" rx="3"/><rect x="136" y="358" width="11" height="32" rx="3"/></g>
    <g font-size="10" fill="#39506e">
      <text x="166" y="300">local &amp; casual</text>
      <text x="166" y="314">contributors join,</text>
      <text x="166" y="328">adding place-based</text>
      <text x="166" y="342">perspectives</text>
    </g>
  </g>
  <g>
    <rect x="342" y="262" width="192" height="148" rx="10" fill="#e9e4f6"/>
    <rect x="356" y="246" width="164" height="32" rx="4" fill="#202020"/>
    <text x="438" y="267" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">INFLUENCE STAYS PUT</text>
    <g fill="#8b80c4"><rect x="364" y="332" width="14" height="58" rx="3"/><rect x="386" y="378" width="11" height="12" rx="3"/><rect x="402" y="380" width="11" height="10" rx="3"/><rect x="418" y="379" width="11" height="11" rx="3"/></g>
    <g font-size="10" fill="#4c4374">
      <text x="442" y="300">prolific users still</text>
      <text x="442" y="314">produce most edits;</text>
      <text x="442" y="328">influence is not</text>
      <text x="442" y="342">evenly redistributed</text>
    </g>
  </g>
</svg>
