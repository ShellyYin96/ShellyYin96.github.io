<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 452" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="400" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4a4a4a"/></marker>
  </defs>

  <text x="300" y="26" font-size="13.5" font-weight="800" fill="#3a3a3a" text-anchor="middle" letter-spacing="1">DO SYSTEMS NARROW OR WIDEN THE KNOWLEDGE GAP?</text>
  <text x="300" y="44" font-size="10.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">a triple-difference comparison: dense vs. sparse, before vs. after, tasked vs. untasked places</text>
  <g transform="translate(0,42)">

  <!-- ===== Tasking Manager window (grayscale, thin strokes) ===== -->
  <g>
    <rect x="26" y="26" width="240" height="150" rx="8" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.8"/>
    <line x1="26" y1="54" x2="266" y2="54" stroke="#dcdcdc" stroke-width="1.5"/>
    <circle cx="44" cy="40" r="5" fill="#dd7a72"/>
    <text x="55" y="44" font-size="11" font-weight="600" fill="#4a4a4a">Tasking Manager</text>
    <!-- two project cards -->
    <g>
      <rect x="40" y="66" width="100" height="96" rx="6" fill="#fafafa" stroke="#d5d5d5" stroke-width="1.4"/>
      <rect x="49" y="75" width="58" height="7" rx="3.5" fill="#8f8f8f"/>
      <rect x="49" y="88" width="80" height="5" rx="2.5" fill="#e2e2e2"/>
      <rect x="49" y="97" width="66" height="5" rx="2.5" fill="#e2e2e2"/>
      <text x="49" y="120" font-size="8.5" fill="#8f8f8f">61 contributors</text>
      <rect x="49" y="126" width="80" height="5" rx="2.5" fill="#eddedd"/><rect x="49" y="126" width="48" height="5" rx="2.5" fill="#dd7a72"/>
      <text x="49" y="152" font-size="8.5" fill="#8f8f8f" font-style="italic">Easy</text>
    </g>
    <g>
      <rect x="152" y="66" width="100" height="96" rx="6" fill="#fafafa" stroke="#d5d5d5" stroke-width="1.4"/>
      <rect x="161" y="75" width="58" height="7" rx="3.5" fill="#8f8f8f"/>
      <rect x="161" y="88" width="80" height="5" rx="2.5" fill="#e2e2e2"/>
      <rect x="161" y="97" width="66" height="5" rx="2.5" fill="#e2e2e2"/>
      <text x="161" y="120" font-size="8.5" fill="#8f8f8f">396 contributors</text>
      <rect x="161" y="126" width="80" height="5" rx="2.5" fill="#eddedd"/><rect x="161" y="126" width="70" height="5" rx="2.5" fill="#dd7a72"/>
      <text x="161" y="152" font-size="8.5" fill="#8f8f8f" font-style="italic">Easy</text>
    </g>
  </g>
  <!-- lavender mono chip -->
  <rect x="66" y="192" width="160" height="26" rx="7" fill="#e7e2f6"/>
  <text x="146" y="209" font-size="12.5" font-weight="600" fill="#6a5fb8" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">mapping tasks</text>

  <!-- curved arrow to regions -->
  <path d="M 274 100 Q 310 96 336 96" stroke="#4a4a4a" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- ===== two comparing regions (thin gray tiles, soft red dots) ===== -->
  <g>
    <rect x="346" y="34" width="108" height="120" rx="8" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.8"/>
    <text x="400" y="26" font-size="11.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="1">REGION A</text>
    <g fill="#e2938c">
      <circle cx="368" cy="56" r="4"/><circle cx="392" cy="50" r="4"/><circle cx="416" cy="60" r="4"/><circle cx="436" cy="50" r="4"/>
      <circle cx="376" cy="78" r="4"/><circle cx="402" cy="74" r="4"/><circle cx="426" cy="82" r="4"/>
      <circle cx="364" cy="100" r="4"/><circle cx="390" cy="96" r="4"/><circle cx="416" cy="104" r="4"/><circle cx="438" cy="96" r="4"/>
      <circle cx="380" cy="126" r="4"/><circle cx="408" cy="122" r="4"/><circle cx="432" cy="130" r="4"/>
    </g>
    <text x="400" y="170" font-size="10" fill="#8f8f8f" text-anchor="middle" font-style="italic">densely populated</text>
  </g>
  <g>
    <rect x="468" y="34" width="108" height="120" rx="8" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.8"/>
    <text x="522" y="26" font-size="11.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="1">REGION B</text>
    <g fill="#c9c2e6">
      <circle cx="496" cy="68" r="4"/><circle cx="548" cy="98" r="4"/><circle cx="512" cy="126" r="4"/>
    </g>
    <text x="522" y="170" font-size="10" fill="#8f8f8f" text-anchor="middle" font-style="italic">sparsely populated</text>
  </g>
  <text x="461" y="192" font-size="10" fill="#8f8f8f" text-anchor="middle" font-style="italic">same tasks, different places</text>

  <!-- ===== triple-difference: two panels, compare the gaps ===== -->

  <!-- panel 1: where tasks launched -->
  <g>
    <text x="160" y="262" font-size="10" font-weight="600" fill="#6f6f6f" text-anchor="middle" font-style="italic">where tasks launched</text>
    <path d="M 56 366 L 264 366 M 56 366 L 56 272" stroke="#b8b8b8" stroke-width="1.6"/>
    <line x1="160" y1="272" x2="160" y2="366" stroke="#9b9b9b" stroke-width="1.3" stroke-dasharray="3 4"/>
    <text x="160" y="380" font-size="8.5" fill="#9b9b9b" text-anchor="middle">launch</text>
    <path d="M 66 350 L 160 344 L 246 292" stroke="#4a4a4a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 66 356 L 160 352 L 246 338" stroke="#b3b3b3" stroke-width="2.4" fill="none" stroke-dasharray="6 6" stroke-linecap="round"/>
    <circle cx="246" cy="292" r="3.5" fill="#e2938c"/>
    <circle cx="246" cy="338" r="3.5" fill="#c9c2e6"/>
    <path d="M 256 294 L 256 336" stroke="#4a4a4a" stroke-width="1.5" marker-end="url(#ah)" marker-start="url(#ah)"/>
    <text x="262" y="318" font-size="10" font-weight="700" fill="#4a4a4a">gap&#8321;</text>
  </g>

  <!-- panel 2: elsewhere -->
  <g>
    <text x="440" y="262" font-size="10" font-weight="600" fill="#6f6f6f" text-anchor="middle" font-style="italic">elsewhere (no tasks)</text>
    <path d="M 336 366 L 544 366 M 336 366 L 336 272" stroke="#b8b8b8" stroke-width="1.6"/>
    <line x1="440" y1="272" x2="440" y2="366" stroke="#9b9b9b" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M 346 350 L 440 346 L 526 334" stroke="#4a4a4a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 346 356 L 440 353 L 526 346" stroke="#b3b3b3" stroke-width="2.4" fill="none" stroke-dasharray="6 6" stroke-linecap="round"/>
    <circle cx="526" cy="334" r="3.5" fill="#e2938c"/>
    <circle cx="526" cy="346" r="3.5" fill="#c9c2e6"/>
    <path d="M 536 335 L 536 345" stroke="#4a4a4a" stroke-width="1.5"/>
    <text x="542" y="344" font-size="10" font-weight="700" fill="#4a4a4a">gap&#8322;</text>
  </g>

  <!-- legend + the third difference -->
  <circle cx="80" cy="394" r="3.5" fill="#e2938c"/><text x="88" y="397" font-size="9" fill="#6f6f6f">dense</text>
  <circle cx="130" cy="394" r="3.5" fill="#c9c2e6"/><text x="138" y="397" font-size="9" fill="#6f6f6f">sparse</text>
  <text x="430" y="397" font-size="10.5" font-weight="700" fill="#4a4a4a" text-anchor="middle">effect = gap&#8321; &#8722; gap&#8322;</text>
  </g>
</svg>