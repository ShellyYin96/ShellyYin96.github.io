<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="Inter,-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="360" fill="#ffffff"/>
  <!-- two map tiles: dense vs sparse -->
  <rect x="35" y="75" width="220" height="190" rx="12" fill="#f4f6fb" stroke="#d5ddef" stroke-width="2"/>
  <text x="145" y="60" font-size="14" font-weight="700" fill="#3d4a75" text-anchor="middle">DENSE</text>
  <g fill="#5b7de0"><circle cx="80" cy="115" r="5"/><circle cx="110" cy="130" r="5"/><circle cx="95" cy="160" r="5"/><circle cx="140" cy="110" r="5"/><circle cx="165" cy="145" r="5"/><circle cx="130" cy="185" r="5"/><circle cx="185" cy="120" r="5"/><circle cx="200" cy="170" r="5"/><circle cx="70" cy="200 " r="5"/><circle cx="160" cy="210" r="5"/><circle cx="215" cy="215" r="5"/><circle cx="105" cy="228" r="5"/><circle cx="185" cy="240" r="5"/></g>
  <rect x="345" y="75" width="220" height="190" rx="12" fill="#f4f6fb" stroke="#d5ddef" stroke-width="2"/>
  <text x="455" y="60" font-size="14" font-weight="700" fill="#3d4a75" text-anchor="middle">SPARSE</text>
  <g fill="#c9c0ee"><circle cx="400" cy="130" r="5"/><circle cx="490" cy="180" r="5"/><circle cx="440" cy="230" r="5"/></g>
  <!-- triple-diff mini chart -->
  <g stroke-linecap="round">
    <path d="M 200 320 L 400 320" stroke="#d5ddef" stroke-width="2"/>
    <path d="M 215 315 L 290 296 L 385 258" stroke="#5b7de0" stroke-width="4" fill="none"/>
    <path d="M 215 316 L 290 308 L 385 300" stroke="#c9c0ee" stroke-width="4" fill="none" stroke-dasharray="7 7"/>
  </g>
  <text x="300" y="345" font-size="13" font-weight="700" fill="#3d4a75" text-anchor="middle">TRIPLE-DIFFERENCE</text>
</svg>
