<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="430" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4a4a4a"/></marker>
  </defs>

  <!-- title block -->
  <text x="300" y="30" font-size="14" font-weight="800" fill="#333333" text-anchor="middle" letter-spacing="1.5">WHY DO TEACHERS SEE RESPONSIBLE AI DIFFERENTLY?</text>
  <text x="300" y="48" font-size="10.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">a survey of 98 K&#8211;12 teachers on values, context, and Responsible AI</text>
  <line x1="210" y1="60" x2="390" y2="60" stroke="#e4e4e4" stroke-width="1.4"/>

  <!-- left column: two input cards -->
  <g>
    <rect x="36" y="104" width="200" height="140" rx="10" fill="#e2ede0"/>
    <rect x="50" y="88" width="172" height="32" rx="4" fill="#202020"/>
    <text x="136" y="109" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">PEDAGOGICAL VALUES</text>
    <g fill="#aec7a8">
      <rect x="56" y="140" width="150" height="9" rx="4.5"/>
      <rect x="56" y="158" width="126" height="9" rx="4.5"/>
      <rect x="56" y="176" width="140" height="9" rx="4.5"/>
      <rect x="56" y="194" width="110" height="9" rx="4.5"/>
    </g>
    <text x="136" y="228" font-size="9.5" fill="#5f7a58" text-anchor="middle" font-style="italic">what teachers value in teaching</text>
  </g>
  <g>
    <rect x="36" y="278" width="200" height="128" rx="10" fill="#dde7f5"/>
    <rect x="50" y="262" width="172" height="32" rx="4" fill="#202020"/>
    <text x="136" y="283" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">CONTEXTUAL FACTORS</text>
    <g font-size="10.5" fill="#39506e">
      <circle cx="58" cy="316" r="2" fill="#5b7aa8"/><text x="68" y="319">grade level</text>
      <circle cx="58" cy="342" r="2" fill="#5b7aa8"/><text x="68" y="345">subject area</text>
      <circle cx="58" cy="368" r="2" fill="#5b7aa8"/><text x="68" y="371">school resources</text>
    </g>
  </g>

  <!-- arrows converge -->
  <path d="M 244 174 Q 286 190 316 232" stroke="#4a4a4a" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>
  <path d="M 244 336 Q 286 320 316 274" stroke="#4a4a4a" stroke-width="1.8" fill="none" marker-end="url(#ah)"/>
  <text x="286" y="258" font-size="10.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" font-style="italic">shape</text>

  <!-- right: perceptions of RAI with the five real principles -->
  <g>
    <rect x="342" y="104" width="222" height="302" rx="10" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.6"/>
    <rect x="356" y="88" width="194" height="32" rx="4" fill="#202020"/>
    <text x="453" y="109" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">HOW TEACHERS PRIORITIZE</text>
    <g font-weight="700" font-size="12" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
      <rect x="378" y="136" width="150" height="32" rx="16" fill="#e7e2f6"/><text x="453" y="157" fill="#6a5fb8">autonomy</text>
      <rect x="378" y="182" width="150" height="32" rx="16" fill="#e7e2f6"/><text x="453" y="203" fill="#6a5fb8">transparency</text>
      <rect x="378" y="228" width="150" height="32" rx="16" fill="#e7e2f6"/><text x="453" y="249" fill="#6a5fb8">safety</text>
      <rect x="378" y="274" width="150" height="32" rx="16" fill="#e7e2f6"/><text x="453" y="295" fill="#6a5fb8">fairness</text>
      <rect x="378" y="320" width="150" height="32" rx="16" fill="#e7e2f6"/><text x="453" y="341" fill="#6a5fb8">performance</text>
    </g>
    <text x="453" y="384" font-size="9.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">five Responsible AI principles</text>
  </g>
</svg>
