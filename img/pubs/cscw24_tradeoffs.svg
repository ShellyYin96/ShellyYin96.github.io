<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="Inter,-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="360" fill="#ffffff"/>
  <!-- see-saw -->
  <path d="M 300 250 L 270 300 L 330 300 Z" fill="#c9c0ee"/>
  <rect x="90" y="232" width="420" height="12" rx="6" fill="#7b6fd0" transform="rotate(-7 300 238)"/>
  <!-- productivity pan (left, lower) -->
  <g transform="translate(120,175)">
    <rect x="-60" y="0" width="120" height="80" rx="10" fill="#e9effc" stroke="#aac4f5" stroke-width="2"/>
    <g fill="#5b7de0">
      <rect x="-44" y="52" width="14" height="18" rx="3"/>
      <rect x="-24" y="38" width="14" height="32" rx="3"/>
      <rect x="-4" y="24" width="14" height="46" rx="3"/>
      <rect x="16" y="12" width="14" height="58" rx="3"/>
      <rect x="36" y="30" width="14" height="40" rx="3"/>
    </g>
    <text x="0" y="-12" font-size="14" font-weight="700" fill="#3d4a75" text-anchor="middle">PRODUCTIVITY</text>
  </g>
  <!-- equality pan (right, higher) -->
  <g transform="translate(480,120)">
    <rect x="-60" y="0" width="120" height="80" rx="10" fill="#eaf4ee" stroke="#b4dcc5" stroke-width="2"/>
    <g fill="#7bbf98">
      <rect x="-44" y="34" width="14" height="36" rx="3"/>
      <rect x="-24" y="34" width="14" height="36" rx="3"/>
      <rect x="-4" y="34" width="14" height="36" rx="3"/>
      <rect x="16" y="34" width="14" height="36" rx="3"/>
      <rect x="36" y="34" width="14" height="36" rx="3"/>
    </g>
    <text x="0" y="-12" font-size="14" font-weight="700" fill="#3c6e54" text-anchor="middle">EQUALITY</text>
  </g>
  <text x="300" y="342" font-size="13" font-weight="700" fill="#4b4370" text-anchor="middle">MICROTASK DESIGN SHAPES WHOSE PLACES GET MAPPED</text>
</svg>
