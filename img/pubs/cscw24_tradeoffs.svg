<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="440" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4a4a4a"/></marker>
  </defs>

  <!-- title block -->
  <text x="300" y="28" font-size="14" font-weight="800" fill="#333333" text-anchor="middle" letter-spacing="1.5">CAN MICROTASKING BE PRODUCTIVE AND EQUITABLE?</text>
  <text x="300" y="46" font-size="10.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">a natural experiment: 7,874 Tasking Manager projects vs. matched nearby regions</text>
  <line x1="210" y1="58" x2="390" y2="58" stroke="#e4e4e4" stroke-width="1.4"/>

  <!-- natural experiment row -->
  <rect x="60" y="80" width="170" height="30" rx="8" fill="#e7e2f6"/>
  <text x="145" y="100" font-size="12.5" font-weight="600" fill="#6a5fb8" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">project created</text>
  <path d="M 238 95 L 272 95" stroke="#4a4a4a" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- paired regions -->
  <g>
    <rect x="284" y="70" width="120" height="80" rx="8" fill="#ffffff" stroke="#a9a9a9" stroke-width="1.8"/>
    <g fill="#e2938c"><circle cx="308" cy="94" r="3.5"/><circle cx="330" cy="88" r="3.5"/><circle cx="352" cy="98" r="3.5"/><circle cx="316" cy="114" r="3.5"/><circle cx="340" cy="110" r="3.5"/><circle cx="364" cy="118" r="3.5"/><circle cx="382" cy="100" r="3.5"/><circle cx="300" cy="132" r="3.5"/><circle cx="352" cy="134" r="3.5"/></g>
    <text x="344" y="164" font-size="9.5" fill="#6f6f6f" text-anchor="middle" font-style="italic">project region</text>
  </g>
  <text x="424" y="115" font-size="12" font-weight="700" fill="#9b9b9b" text-anchor="middle">vs</text>
  <g>
    <rect x="444" y="70" width="120" height="80" rx="8" fill="#ffffff" stroke="#c9c9c9" stroke-width="1.6" stroke-dasharray="5 4"/>
    <g fill="#c9c2e6"><circle cx="474" cy="98" r="3.5"/><circle cx="518" cy="112" r="3.5"/><circle cx="492" cy="132" r="3.5"/></g>
    <text x="504" y="164" font-size="9.5" fill="#6f6f6f" text-anchor="middle" font-style="italic">matched nearby region</text>
  </g>
  <text x="424" y="184" font-size="9.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">paired by distance &amp; population</text>

  <!-- connectors down -->
  <path d="M 300 196 L 300 214" stroke="#c9c9c9" stroke-width="1.4" fill="none" marker-end="url(#ah)"/>

  <!-- left: difference-in-differences chart (centered) -->
  <g transform="translate(135,0)">
    <text x="165" y="238" font-size="10.5" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="0.8">MAPPING ACTIVITY (DiD)</text>
    <path d="M 56 352 L 276 352 M 56 352 L 56 250" stroke="#b8b8b8" stroke-width="1.6"/>
    <line x1="166" y1="250" x2="166" y2="352" stroke="#9b9b9b" stroke-width="1.3" stroke-dasharray="3 4"/>
    <text x="166" y="366" font-size="8.5" fill="#9b9b9b" text-anchor="middle">project created</text>
    <path d="M 66 336 L 166 330 L 262 268" stroke="#4a4a4a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M 66 342 L 166 338 L 262 330" stroke="#b3b3b3" stroke-width="2.6" fill="none" stroke-dasharray="6 6" stroke-linecap="round"/>
    <circle cx="262" cy="268" r="3.5" fill="#e2938c"/>
    <circle cx="262" cy="330" r="3.5" fill="#c9c2e6"/>
    <path d="M 270 272 L 270 326" stroke="#4a4a4a" stroke-width="1.5" marker-end="url(#ah)" marker-start="url(#ah)"/>
    <text x="277" y="302" font-size="9.5" font-weight="700" fill="#4a4a4a">causal</text>
    <text x="277" y="314" font-size="9.5" font-weight="700" fill="#4a4a4a">effect</text>
    <text x="98" y="286" font-size="9" fill="#4a4a4a">project region</text>
    <text x="98" y="346" font-size="9" fill="#9b9b9b">matched region</text>
  </g>

  <!-- takeaway -->
  <text x="300" y="396" font-size="12" font-weight="700" fill="#4a4a4a" text-anchor="middle" letter-spacing="0.5">MORE MAPPING, BUT IN FEWER HANDS</text>
  <text x="300" y="416" font-size="9.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">microtasking boosts productivity while worsening power-law inequity</text>
</svg>