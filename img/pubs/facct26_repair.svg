<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="360" fill="#ffffff"/>
  <!-- repair icon: hand + wrench simplified as wrench in circle -->
  <circle cx="300" cy="52" r="34" fill="#f2f3f5" stroke="#2b3137" stroke-width="3"/>
  <g transform="rotate(40 300 52)">
    <rect x="294" y="34" width="12" height="40" rx="6" fill="#2b3137"/>
    <circle cx="300" cy="30" r="10" fill="none" stroke="#2b3137" stroke-width="8"/>
  </g>
  <!-- connector lines -->
  <path d="M 300 88 L 300 104 M 110 104 L 490 104 M 110 104 L 110 122 M 300 104 L 300 122 M 490 104 L 490 122" stroke="#2b3137" stroke-width="3" fill="none"/>
  <!-- three cards: gray / yellow / pink like the paper figure -->
  <g>
    <rect x="30" y="150" width="160" height="180" rx="18" fill="#dcdfe4"/>
    <rect x="42" y="122" width="136" height="52" rx="6" fill="#111417"/>
    <text x="110" y="144" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">ENTANGLED</text>
    <text x="110" y="164" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">VALUES</text>
    <g fill="#b9bec7">
      <rect x="52" y="196" width="116" height="9" rx="4.5"/><rect x="52" y="214" width="96" height="9" rx="4.5"/>
      <rect x="52" y="244" width="116" height="9" rx="4.5"/><rect x="52" y="262" width="84" height="9" rx="4.5"/>
      <rect x="52" y="292" width="104" height="9" rx="4.5"/>
    </g>
  </g>
  <g>
    <rect x="220" y="150" width="160" height="180" rx="18" fill="#faf0bd"/>
    <rect x="228" y="122" width="144" height="52" rx="6" fill="#111417"/>
    <text x="300" y="144" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">INVALID</text>
    <text x="300" y="164" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">METRICS</text>
    <g fill="#e3d48a">
      <rect x="242" y="196" width="116" height="9" rx="4.5"/><rect x="242" y="214" width="96" height="9" rx="4.5"/>
      <rect x="242" y="244" width="116" height="9" rx="4.5"/><rect x="242" y="262" width="84" height="9" rx="4.5"/>
      <rect x="242" y="292" width="104" height="9" rx="4.5"/>
    </g>
  </g>
  <g>
    <rect x="410" y="150" width="160" height="180" rx="18" fill="#f8d4da"/>
    <rect x="418" y="122" width="144" height="52" rx="6" fill="#111417"/>
    <text x="490" y="144" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">RELATIONAL</text>
    <text x="490" y="164" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">VALUES</text>
    <g fill="#e6a9b3">
      <rect x="432" y="196" width="116" height="9" rx="4.5"/><rect x="432" y="214" width="96" height="9" rx="4.5"/>
      <rect x="432" y="244" width="116" height="9" rx="4.5"/><rect x="432" y="262" width="84" height="9" rx="4.5"/>
      <rect x="432" y="292" width="104" height="9" rx="4.5"/>
    </g>
  </g>
