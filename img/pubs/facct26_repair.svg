<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="Inter,-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="360" fill="#ffffff"/>
  <!-- broken AI card -->
  <g>
    <rect x="30" y="90" width="150" height="180" rx="12" fill="#f0edfb" stroke="#c9c0ee" stroke-width="2"/>
    <rect x="48" y="115" width="114" height="14" rx="7" fill="#d8d1f2"/>
    <rect x="48" y="140" width="90" height="14" rx="7" fill="#d8d1f2"/>
    <rect x="48" y="165" width="104" height="14" rx="7" fill="#e8a09a"/>
    <path d="M 95 200 L 108 220 L 98 220 L 112 245" stroke="#d9776f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="105" y="82" font-size="15" font-weight="700" fill="#4b4370" text-anchor="middle">AI LESSON</text>
    <circle cx="162" cy="108" r="13" fill="#e8a09a"/>
    <text x="162" y="113" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">!</text>
  </g>
  <!-- teacher figure with wrench -->
  <g>
    <circle cx="300" cy="140" r="24" fill="#9ccdb0"/>
    <path d="M 300 164 Q 268 180 268 228 L 332 228 Q 332 180 300 164 Z" fill="#9ccdb0"/>
    <g transform="rotate(35 345 150)">
      <rect x="338" y="128" width="12" height="48" rx="6" fill="#6b7280"/>
      <circle cx="344" cy="124" r="12" fill="none" stroke="#6b7280" stroke-width="9"/>
    </g>
    <text x="300" y="262" font-size="14" font-weight="700" fill="#3c6e54" text-anchor="middle">TEACHER</text>
    <text x="300" y="280" font-size="14" font-weight="700" fill="#3c6e54" text-anchor="middle">REPAIR WORK</text>
  </g>
  <path d="M 195 178 L 250 178" stroke="#9aa2aa" stroke-width="3" marker-end="url(#a)"/>
  <path d="M 352 178 L 407 178" stroke="#9aa2aa" stroke-width="3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9aa2aa"/></marker></defs>
  <!-- repaired card -->
  <g>
    <rect x="420" y="90" width="150" height="180" rx="12" fill="#eaf4ee" stroke="#b4dcc5" stroke-width="2"/>
    <rect x="438" y="115" width="114" height="14" rx="7" fill="#c4e3d2"/>
    <rect x="438" y="140" width="90" height="14" rx="7" fill="#c4e3d2"/>
    <rect x="438" y="165" width="104" height="14" rx="7" fill="#c4e3d2"/>
    <rect x="438" y="190" width="70" height="14" rx="7" fill="#c4e3d2"/>
    <circle cx="552" cy="108" r="13" fill="#7bbf98"/>
    <path d="M 546 108 L 550 113 L 559 103" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="495" y="82" font-size="15" font-weight="700" fill="#3c6e54" text-anchor="middle">CLASS GOES ON</text>
  </g>
</svg>
