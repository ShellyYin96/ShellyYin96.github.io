<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 424" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="424" fill="#ffffff"/>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#4a4a4a"/></marker>
  </defs>

  <!-- title block -->
  <text x="300" y="30" font-size="14" font-weight="800" fill="#333333" text-anchor="middle" letter-spacing="1.5">WHEN AI BREAKS, WHO REPAIRS?</text>
  <text x="300" y="48" font-size="10.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">focus groups and a deliberation tool with K&#8211;12 teachers</text>
  <line x1="210" y1="60" x2="390" y2="60" stroke="#e4e4e4" stroke-width="1.4"/>

  <!-- flow row -->
  <g>
    <rect x="90" y="78" width="132" height="44" rx="8" fill="#ffffff" stroke="#b3b3b3" stroke-width="1.6"/>
    <text x="148" y="97" font-size="11.5" font-weight="700" fill="#404040" text-anchor="middle" letter-spacing="0.6">AI BREAKS</text>
    <text x="148" y="112" font-size="9.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">mid&#8209;lesson</text>
    <path d="M 197 88 L 204 96 L 199 96 L 207 106" stroke="#dd7a72" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <line x1="230" y1="100" x2="264" y2="100" stroke="#4a4a4a" stroke-width="1.8" marker-end="url(#ah)"/>
  <g transform="rotate(40 300 100)">
    <rect x="296" y="90" width="8" height="24" rx="4" fill="#4a4a4a"/>
    <circle cx="300" cy="86" r="6" fill="none" stroke="#4a4a4a" stroke-width="4.5"/>
  </g>
  <line x1="336" y1="100" x2="370" y2="100" stroke="#4a4a4a" stroke-width="1.8" marker-end="url(#ah)"/>
  <g>
    <rect x="378" y="78" width="132" height="44" rx="8" fill="#ffffff" stroke="#b3b3b3" stroke-width="1.6"/>
    <text x="444" y="97" font-size="11.5" font-weight="700" fill="#404040" text-anchor="middle" letter-spacing="0.6">TEACHERS REPAIR</text>
    <text x="444" y="112" font-size="9.5" fill="#8f8f8f" text-anchor="middle" font-style="italic">invisible pedagogical work</text>
  </g>

  <!-- connectors -->
  <path d="M 300 128 L 300 140 M 108 140 L 492 140 M 108 140 L 108 150 M 300 140 L 300 150 M 492 140 L 492 150" stroke="#c9c9c9" stroke-width="1.4" fill="none"/>

  <!-- three cards, tight and evenly set -->
  <!-- card 1 -->
  <g>
    <rect x="24" y="172" width="168" height="232" rx="10" fill="#e0e3e8"/>
    <rect x="38" y="156" width="140" height="34" rx="4" fill="#202020"/>
    <text x="108" y="171" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">ENTANGLED</text>
    <text x="108" y="184" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">VALUES</text>
    <g font-size="10" fill="#43494f">
      <circle cx="44" cy="212" r="2" fill="#7d858e"/>
      <text x="54" y="215">AI surveillance vs.</text>
      <text x="54" y="229">accountability, autonomy,</text>
      <text x="54" y="243">and privacy</text>
      <circle cx="44" cy="270" r="2" fill="#7d858e"/>
      <text x="54" y="273">mandated adoption</text>
      <text x="54" y="287">reshapes autonomy</text>
      <text x="54" y="301">and efficiency</text>
      <circle cx="44" cy="328" r="2" fill="#7d858e"/>
      <text x="54" y="331">assessment tangles</text>
      <text x="54" y="345">fairness, transparency,</text>
      <text x="54" y="359">and trust</text>
    </g>
  </g>
  <!-- card 2 -->
  <g>
    <rect x="216" y="172" width="168" height="232" rx="10" fill="#faf0c2"/>
    <rect x="226" y="156" width="148" height="34" rx="4" fill="#202020"/>
    <text x="300" y="171" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">INVALID STANDARD</text>
    <text x="300" y="184" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">VALUES &amp; METRICS</text>
    <g font-size="10" fill="#5c5220">
      <circle cx="236" cy="212" r="2" fill="#a8912f"/>
      <text x="246" y="215">cultural misreadings in</text>
      <text x="246" y="229">AI engagement models</text>
      <circle cx="236" cy="256" r="2" fill="#a8912f"/>
      <text x="246" y="259">feedback misaligned with</text>
      <text x="246" y="273">instructional coherence</text>
      <circle cx="236" cy="300" r="2" fill="#a8912f"/>
      <text x="246" y="303">authentic learning beyond</text>
      <text x="246" y="317">quantifiable metrics</text>
    </g>
  </g>
  <!-- card 3 -->
  <g>
    <rect x="408" y="172" width="168" height="232" rx="10" fill="#f8d8dd"/>
    <rect x="418" y="156" width="148" height="34" rx="4" fill="#202020"/>
    <text x="492" y="171" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">RELATIONAL</text>
    <text x="492" y="184" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.4">PEDAGOGICAL VALUES</text>
    <g font-size="10" fill="#6e3540">
      <circle cx="428" cy="212" r="2" fill="#c06a75"/>
      <text x="438" y="215">predictive profiling vs.</text>
      <text x="438" y="229">relational trust</text>
      <circle cx="428" cy="256" r="2" fill="#c06a75"/>
      <text x="438" y="259">preserving emotional ties</text>
      <text x="438" y="273">to human oversight</text>
      <circle cx="428" cy="300" r="2" fill="#c06a75"/>
      <text x="438" y="303">human intervention for</text>
      <text x="438" y="317">growth-oriented learning</text>
    </g>
  </g>
</svg>
